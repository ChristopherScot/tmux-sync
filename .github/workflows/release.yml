name: release

# Tag a vX.Y.Z release -> GoReleaser builds the matrix
# (darwin/{arm64,amd64}, linux/{amd64,arm64}) and publishes archives + SHA256SUMS.
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub Release

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser needs full history for the changelog
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
