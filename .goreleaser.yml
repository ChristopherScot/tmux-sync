version: 2
project_name: tmux-sync

before:
  hooks:
    - go mod tidy

builds:
  - id: tmux-sync
    main: ./
    binary: tmux-sync
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: tmux-sync
    format: tar.gz
    name_template: >-
      {{- .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else }}{{ .Os }}{{ end }}_
      {{- .Arch }}

checksum:
  name_template: "SHA256SUMS"

changelog:
  use: github
  sort: asc

release:
  draft: false
  prerelease: auto
